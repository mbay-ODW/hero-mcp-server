services:
  hero-mcp-server:
    build:
      context: https://github.com/your-github-user/hero-mcp-server.git
      dockerfile: Dockerfile
    container_name: hero-mcp-server
    restart: unless-stopped
    environment:
      - HERO_API_KEY=${HERO_API_KEY}
    stdin_open: true
    tty: true
    labels:
      - "com.hero.description=HERO Handwerker MCP Server"
