services:
  hero-mcp-server:
    image: ghcr.io/your-github-user/hero-mcp-server:latest
    container_name: hero-mcp-server
    restart: unless-stopped
    environment:
      - HERO_API_KEY=${HERO_API_KEY}
    stdin_open: true
    tty: true
    labels:
      - "com.hero.description=HERO Handwerker MCP Server"
