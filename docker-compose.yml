services:
  hero-mcp-server:
    build: .
    image: hero-mcp-server:latest
    container_name: hero-mcp-server
    restart: unless-stopped
    environment:
      - HERO_API_KEY=${HERO_API_KEY:-DEIN_HERO_API_KEY}
    stdin_open: true
    tty: true
    labels:
      - "com.hero.description=HERO Handwerker MCP Server"
