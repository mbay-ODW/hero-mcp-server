services:
  hero-mcp-server:
    image: ghcr.io/mbay-odw/hero-mcp-server:latest
    container_name: hero-mcp-server
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO
      - MCP_TRANSPORT=sse
      - PORT=8000
      # Hero API
      - HERO_API_KEY=${HERO_API_KEY}
      # Auth
      - MCP_API_KEY=${MCP_API_KEY}
      - OIDC_INTROSPECTION_URL=https://hero-mcp.${DOMAIN}/api/oidc/introspection
      - OIDC_CLIENT_ID=hero-mcp
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.hero-mcp-sse.rule=Host(`hero-mcp.${DOMAIN}`) && PathPrefix(`/sse`)"
      - "traefik.http.routers.hero-mcp-sse.entrypoints=websecure"
      - "traefik.http.routers.hero-mcp-sse.service=hero-mcp-svc"
      - "traefik.http.routers.hero-mcp-sse.tls=true"
      - "traefik.http.routers.hero-mcp-sse.tls.certresolver=mydnschallenge"
      - "traefik.http.routers.hero-mcp-sse.middlewares=middlewares-rate-limit@file,middlewares-secure-headers@file"
      - "traefik.http.routers.hero-mcp-msg.rule=Host(`hero-mcp.${DOMAIN}`) && PathPrefix(`/messages`)"
      - "traefik.http.routers.hero-mcp-msg.entrypoints=websecure"
      - "traefik.http.routers.hero-mcp-msg.service=hero-mcp-svc"
      - "traefik.http.routers.hero-mcp-msg.tls=true"
      - "traefik.http.routers.hero-mcp-msg.tls.certresolver=mydnschallenge"
      - "traefik.http.routers.hero-mcp-msg.middlewares=middlewares-rate-limit@file,middlewares-secure-headers@file"
      - "traefik.http.services.hero-mcp-svc.loadbalancer.server.port=8000"
    networks:
      - traefik

networks:
  traefik:
    external: true
