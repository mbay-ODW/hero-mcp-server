# Authelia OIDC-Konfiguration für den HERO MCP Server
# Diesen Block in deine bestehende configuration.yml unter identity_providers.oidc.clients einfügen
#
# Den bcrypt-Hash des Client-Secrets erzeugen mit:
#   docker run authelia/authelia:latest authelia crypto hash generate bcrypt --password 'dein_secret'

identity_providers:
  oidc:
    hmac_secret: CHANGE_ME_RANDOM_SECRET_32_CHARS
    issuer_certificate_chain: |
      -----BEGIN CERTIFICATE-----
      # Dein Authelia-Zertifikat hier einfügen
      -----END CERTIFICATE-----
    issuer_private_key: |
      -----BEGIN PRIVATE KEY-----
      # Deinen privaten Schlüssel hier einfügen
      -----END PRIVATE KEY-----

    access_token_lifespan: 12h
    authorize_code_lifespan: 1m
    id_token_lifespan: 12h
    refresh_token_lifespan: 90m
    enable_client_debug_messages: false

    cors:
      endpoints:
        - authorization
        - token
        - revocation
        - introspection
      allowed_origins:
        - "*"
      allowed_origins_from_client_redirect_uris: false

    clients:
      - client_id: claude-mcp
        client_name: Claude MCP
        client_secret: '$2b$12$BCRYPT_HASH_OF_YOUR_SECRET_HERE'
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - https://claude.ai/api/mcp/auth_callback
        scopes: [openid, profile, email, offline_access, address, phone, groups]
        grant_types: [authorization_code, refresh_token]
        response_types: [code]
        token_endpoint_auth_method: client_secret_post
