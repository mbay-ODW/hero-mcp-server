http:
  middlewares:
    rewrite-authorize-hero:
      replacePath:
        path: "/api/oidc/authorization"

  routers:
    hero-mcp-authorize:
      rule: "Host(`hero-mcp.example.com`) && PathPrefix(`/authorize`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [rewrite-authorize-hero]
      tls:
        certResolver: mydnschallenge

    hero-mcp-root:
      rule: "Host(`hero-mcp.example.com`) && Path(`/`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    hero-mcp-oidc:
      rule: "Host(`hero-mcp.example.com`) && PathPrefix(`/api/oidc`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    hero-mcp-api:
      rule: "Host(`hero-mcp.example.com`) && PathPrefix(`/api`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    hero-mcp-consent:
      rule: "Host(`hero-mcp.example.com`) && PathPrefix(`/consent`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    hero-mcp-static:
      rule: "Host(`hero-mcp.example.com`) && PathPrefix(`/static`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    hero-mcp-wellknown:
      rule: "Host(`hero-mcp.example.com`) && PathPrefix(`/.well-known`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

  # Shared Authelia OIDC service – used by all MCP servers
  services:
    authelia-oidc:
      loadBalancer:
        servers:
          - url: "http://authelia:9091"
